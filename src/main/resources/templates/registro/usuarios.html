<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>

    <div class="container mt-5">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0"><i class="fas fa-users me-2"></i>Gestión de Usuarios</h4>
                <span class="badge bg-primary">Panel de Administración</span>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Usuario</th>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Estado</th>
                                <th>Asignar Nuevo Rol</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${usuarios}">
                                <td th:text="${u.username}" class="fw-bold">Username</td>
                                <td th:text="${u.nombre}">Nombre</td>
                                <td th:text="${u.correo}">Correo</td>
                                <td>
                                    <span class="badge bg-success">Activo</span>
                                </td>
                                <td>
                                    <form th:action="@{/registro/asignarRol}" method="post" class="row g-2">
                                        <input type="hidden" name="idUsuario" th:value="${u.idUsuario}" />
                                        
                                        <div class="col-auto">
                                            <select name="nombreRol" class="form-select form-select-sm">
                                                <option value="ROLE_USER">Cliente</option>
                                                <option value="ROLE_VENDEDOR">Vendedor</option>
                                                <option value="ROLE_ADMIN">Administrador</option>
                                            </select>
                                        </div>
                                        <div class="col-auto">
                                            <button type="submit" class="btn btn-primary btn-sm">
                                                <i class="fas fa-sync-alt me-1"></i> Actualizar
                                            </button>
                                        </div>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="mt-3">
                    <a th:href="@{/producto/listado}" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Volver al Inicio
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
