<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>
    <div class="container my-5">
        <div class="card shadow col-md-6 offset-md-3">
            <div class="card-header bg-primary text-white">
                <h3>Registro de Nuevo Usuario</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/registro/crear}" th:object="${usuario}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre de Usuario</label>
                        <input type="text" th:field="*{username}" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" th:field="*{password}" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" th:field="*{correo}" class="form-control" required />
                    </div>
                    <button type="submit" class="btn btn-success w-100">Registrarse</button>
                </form>
            </div>
        </div>
    </div>
    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
