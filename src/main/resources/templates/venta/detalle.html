<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>

    <div class="container my-5">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0"><i class="fas fa-search-plus me-2"></i>Detalle de Orden #[[${venta.idVenta}]]</h4>
                <a th:href="@{/venta/historial}" class="btn btn-light btn-sm text-success fw-bold">
                    <i class="fas fa-arrow-left me-1"></i> Volver al Historial
                </a>
            </div>
            
            <div class="card-body p-4">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <p class="mb-1 text-muted">Fecha de compra:</p>
                        <h6 th:text="${#dates.format(venta.fecha, 'dd/MM/yyyy hh:mm a')}"></h6>
                    </div>
                    <div class="col-md-6 text-md-end">
                        <p class="mb-1 text-muted">Estado:</p>
                        <span class="badge bg-success">Completado / Pagado</span>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered align-middle">
                        <thead class="table-light text-center">
                            <tr>
                                <th>Producto</th>
                                <th>Precio Unitario</th>
                                <th>Cantidad</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${detalles}">
                                <td th:text="'ID Producto: ' + ${item.idProducto}">Nombre del Concentrado</td>
                                <td class="text-center" th:text="'₡' + ${item.precio}">₡0.00</td>
                                <td class="text-center" th:text="${item.cantidad}">0</td>
                                <td class="text-end fw-bold" th:text="'₡' + ${item.precio * item.cantidad}">₡0.00</td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="3" class="text-end fw-bold fs-5">Total Final:</td>
                                <td class="text-end fw-bold fs-5 text-success">₡[[${venta.total}]]</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
