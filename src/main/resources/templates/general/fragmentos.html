<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <title>Concentrados Danny</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #ffffff; }
        .navbar { background-color: #28a745 !important; }
        .user-name-nav { font-size: 0.9rem; color: #d4edda !important; text-decoration: none; transition: 0.3s; }
        .user-name-nav:hover { color: #ffffff !important; transform: scale(1.05); }
        .nav-link { display: flex; align-items: center; transition: all 0.2s; }
        .nav-link i { margin-right: 6px; }
        .nav-icon { font-size: 1.4rem; }
        .nav-link:hover .nav-icon { transform: scale(1.1); color: #d4edda !important; }
        .badge-carrito { font-size: 0.65rem; border: 1px solid white; }
        .footer-custom { background-color: #1e5631; color: white; padding: 20px 0; }
        .btn-historial { border: 1px solid rgba(255,255,255,0.5); color: white !important; }
        .btn-historial:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow-sm">
            <div class="container">
                <a th:href="@{/perfil}" class="navbar-text fw-bold d-flex align-items-center user-name-nav me-auto" 
                   sec:authorize="isAuthenticated()" title="Ver mi Perfil">
                    <i class="fas fa-user-circle me-2 fs-5"></i>
                    <span th:text="${#authentication.name}">Usuario</span>
                </a>

                <a class="navbar-brand fw-bold fs-4 mx-auto" th:href="@{/}">Concentrados Danny</a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <div class="ms-auto d-flex align-items-center">
                        
                        <a th:href="@{/}" title="Inicio" class="nav-link text-white me-3">
                            <i class="fas fa-home nav-icon"></i>
                        </a>

                        <a class="nav-link text-white me-3 position-relative" th:href="@{/deseos/carrito/lista}" title="Carrito">
                            <i class="fas fa-shopping-cart nav-icon"></i>
                            <span th:if="${session.listaItems != null and !session.listaItems.empty}" 
                                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger badge-carrito">
                                [[${session.listaItems.size()}]]
                            </span>
                        </a>

                        <a sec:authorize="isAuthenticated()" class="nav-link text-white fw-bold me-3 btn-historial rounded px-2" th:href="@{/venta/historial}" title="Mis Compras">
                            <i class="fas fa-clock-rotate-left"></i> Historial
                        </a>

                        <a class="nav-link text-white fw-bold me-3" th:href="@{/deseos/lista}">
                            <i class="fas fa-heart text-danger"></i> Deseos
                        </a>

                        <a class="btn btn-light btn-sm text-success fw-bold me-3 shadow-sm px-3" th:href="@{/producto/calculadora}">
                            <i class="fas fa-calculator"></i> Calculadora
                        </a>

                        <a class="nav-link text-white fw-bold me-3" th:href="@{/producto/cobertura}">
                            <i class="fas fa-map-marker-alt"></i> Cobertura
                        </a>
                        
                        <a sec:authorize="hasAnyRole('ADMIN', 'VENDEDOR')" class="nav-link text-white fw-bold me-3 text-warning" th:href="@{/reporte/principal}">
                            <i class="fas fa-chart-line"></i> Reportes
                        </a>

                        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="ms-2">
                            <button type="submit" class="btn btn-outline-light btn-sm" title="Cerrar Sesión">
                                <i class="fas fa-sign-out-alt"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <footer th:fragment="footer" class="footer-custom mt-5">
        <div class="container text-center">
            <p class="mb-1">&copy; 2026 Concentrados Danny - San Rafael de Guatuso</p>
            <div class="social-icons">
                <a href="#" class="text-white me-3 text-decoration-none"><i class="fab fa-facebook fa-lg"></i></a>
                <a href="https://wa.me/50684681376" class="text-white text-decoration-none" target="_blank">
                    <i class="fab fa-whatsapp fa-lg"></i>
                </a>
            </div>
        </div>
    </footer>

</body>
</html>
