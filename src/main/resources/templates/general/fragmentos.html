<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    
    <head th:fragment="head">
        <title>Concentrados Danny</title>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
        <style>
            .navbar-custom { background-color: #28a745; }
            .footer-custom { background-color: #1e5631; color: white; padding: 20px 0; }
        </style>
    </head>

    <body>
        <header th:fragment="header" class="navbar-custom p-3 mb-4 shadow">
            <div class="container d-flex justify-content-between align-items-center">
                <a th:href="@{/}" class="text-white text-decoration-none h4 mb-0">
                    <i class="fas fa-paw"></i> Concentrados Danny
                </a>
                <nav>
                    <a th:href="@{/}" class="btn btn-outline-light btn-sm mx-1">Inicio</a>
                    <span sec:authorize="isAuthenticated()" class="text-white ms-3">
                        <img th:src="${session.imagenUsuario != null ? session.imagenUsuario : '/images/default-user.png'}" 
                             class="rounded-circle" style="width: 30px; height: 30px; object-fit: cover;"/>
                        <span class="ms-1" sec:authentication="name">Usuario</span>
                    </span>
                </nav>
            </div>
        </header>

        <footer th:fragment="footer" class="footer-custom mt-auto">
            <div class="container text-center">
                <p class="mb-1">&copy; 2026 Concentrados Danny - San Rafael de Guatuso</p>
                <div class="social-icons">
                    <a href="#" class="text-white me-3"><i class="fab fa-facebook"></i></a>
                    <a href="https://wa.me/50684681376" class="text-white"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </footer>
    </body>
</html>
