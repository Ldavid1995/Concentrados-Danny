<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Facturación - Concentrados Danny</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #ffffff; }
        .card-header { background-color: #e9f5ec; color: #155724; border-bottom: 2px solid #28a745; }
        .btn-verde { background-color: #218838; color: white; }
        .btn-verde:hover { background-color: #1e7e34; color: white; }
        .badge-pago { font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0"><i class="fas fa-receipt me-2"></i>Facturación</h3>
            <a th:href="@{/producto/listado(especie=${producto.especie})}" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header">
                <h5 class="mb-0">Detalle del Producto</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="fw-bold">Producto</div>
                        <div th:text="${producto.nombre}">Nombre</div>
                    </div>
                    <div class="col-md-3">
                        <div class="fw-bold">Marca</div>
                        <div th:text="${producto.marca}">Marca</div>
                    </div>
                    <div class="col-md-3">
                        <div class="fw-bold">Precio</div>
                        <div>₡[[${producto.precio}]]</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">
                <h5 class="mb-0">Seleccionar Método de Pago</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/facturacion/procesar}" method="post">
                    <input type="hidden" name="idProducto" th:value="${producto.idProducto}"/>

                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Cantidad</label>
                            <input type="number" name="cantidad" class="form-control" min="1" th:value="${cantidad}" required>
                        </div>
                        <div class="col-md-9">
                            <label class="form-label fw-bold d-block">Método de pago</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="metodoPago" id="pagoTarjeta" value="Tarjeta de crédito" checked>
                                <label class="form-check-label" for="pagoTarjeta">Tarjeta de crédito</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="metodoPago" id="pagoTransferencia" value="Transferencia">
                                <label class="form-check-label" for="pagoTransferencia">Transferencia</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-verde">
                        <i class="fas fa-check me-1"></i> Calcular Total
                    </button>
                </form>

                <div th:if="${facturado}" class="alert alert-success mt-4">
                    <div class="fw-bold mb-1 text-uppercase">Resumen de Factura</div>
                    <hr>
                    <div>Producto: <span class="fw-bold" th:text="${producto.nombre}">Producto</span></div>
                    <div>Cantidad: <span class="fw-bold" th:text="${cantidad}">1</span></div>
                    <div>Método de pago: <span class="badge bg-success badge-pago" th:text="${metodoPago}">Método</span></div>
                    <div class="mb-3 fs-5">Total a Pagar: <span class="fw-bold text-success">₡[[${total}]]</span></div>
                    
                    <hr>
                    
                    <form th:action="@{/venta/proceso}" method="post">
                        <input type="hidden" name="idProducto" th:value="${producto.idProducto}"/>
                        <input type="hidden" name="cantidad" th:value="${cantidad}"/>
                        
                        <button type="submit" class="btn btn-success w-100 py-3 fw-bold shadow-sm">
                            CONFIRMAR Y FINALIZAR COMPRA <i class="fas fa-shopping-bag ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
