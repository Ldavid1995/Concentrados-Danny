<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Deseos - Concentrados Danny</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #ffffff; }
        .navbar { background-color: #28a745 !important; }
        .card { border: 1px solid #8b5e3c; }
        .card-header { background-color: #e9f5ec; color: #155724; border-bottom: 2px solid #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #28a745; margin-bottom: 2rem;">
       <div class="container">
           <a class="navbar-brand fw-bold fs-4" href="/">Concentrados Danny</a>

           <div class="ms-auto d-flex align-items-center">

               <a href="/" title="Volver al Menú Principal" class="nav-link text-white me-4">
                   <i class="fas fa-home fa-lg"></i>
               </a>

               <a class="nav-link text-white me-4 position-relative" th:href="@{/deseos/carrito/lista}" title="Ver Carrito">
                   <i class="fas fa-shopping-cart fa-lg"></i>
                   <span th:if="${session.carrito != null and !session.carrito.empty}" 
                         class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                         style="font-size: 0.65rem;">
                       [[${session.carrito.size()}]]
                   </span>
               </a>

               <a class="nav-link text-white fw-bold me-3" th:href="@{/producto/listado}">
                   <i class="fas fa-boxes me-1"></i> Productos
               </a>

               <a class="nav-link text-white fw-bold" href="/reporte/principal">
                   <i class="fas fa-chart-line me-1"></i> Reportes
               </a>
           </div>
       </div>
   </nav>

    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Mi Lista de Deseos</h4>
                <span class="badge bg-danger">[[${cantidadDeseos}]]</span>
            </div>
            <div class="card-body">
                <div th:if="${productos == null or productos.empty}" class="alert alert-info text-center">
                    Aún no has agregado productos a tu lista de deseos.
                </div>

                <div th:if="${productos != null and !productos.empty}" class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Marca</th>
                                <th>Especie</th>
                                <th>Precio</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="producto, contador : ${productos}">
                                <td th:text="${contador.count}">1</td>
                                <td class="fw-bold" th:text="${producto.nombre}">Nombre</td>
                                <td th:text="${producto.marca}">Marca</td>
                                <td th:text="${producto.especie}">Especie</td>
                                <td>₡[[${producto.precio}]]</td>
                                <td class="text-center">
                                    <a th:href="@{/deseos/quitar/{idProducto}(idProducto=${producto.idProducto})}"
                                       class="btn btn-outline-danger btn-sm" title="Quitar de Lista de Deseos">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                    <a th:href="@{/producto/listado(especie=${producto.especie})}"
                                       class="btn btn-outline-secondary btn-sm ms-1" title="Ver en Productos">
                                        <i class="fas fa-external-link-alt"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
