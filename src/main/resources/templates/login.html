<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        
        <div class="container"> <div class="row my-5">
                <div class="col-md-6 offset-md-3 col-lg-4 offset-lg-4">
                    <div class="card shadow"> <div class="card-header bg-success text-white text-center">
                            <h2>[[#{login.login}]]</h2>
                        </div>
                        <div class="card-body">
                            <form method="POST" th:action="@{/login}">
                                
                                <div class="row my-3">
                                    <label for="username" class="col-md-1 my-auto"><i class="fas fa-user-lock"></i></label>
                                    <div class="col-md-11 my-auto">
                                        <input class="form-control" id="username" type="text" name="username" 
                                               th:placeholder="#{login.username}" required autofocus/>
                                    </div>
                                </div>
                                
                                <div class="row my-3">
                                    <label for="password" class="col-md-1 my-auto"><i class="fas fa-key"></i></label>
                                    <div class="col-md-11 my-auto">
                                        <input class="form-control" id="password" type="password" name="password" 
                                               th:placeholder="#{login.password}" required/>
                                    </div>
                                </div>                           
                                
                                <div class="d-grid gap-2 d-md-flex justify-content-around mt-4">
                                    <a th:href="@{/registro/nuevo}" class="btn btn-primary btn-sm">
                                        <i class="fas fa-user-plus"></i> Registrar
                                    </a>                                
                                    <a th:href="@{/registro/recordar}" class="btn btn-info btn-sm">
                                        <i class="fas fa-envelope"></i> Recordar
                                    </a>                                
                                    <button class="btn btn-success" type="submit">
                                        <i class="fas fa-sign-in-alt"></i> Ingresar
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger mt-3 text-center" role="alert">
                        [[#{error.login}]]
                    </div>
                    
                    <div th:if="${param.logout}" class="alert alert-info mt-3 text-center" role="alert">
                        Has cerrado sesión correctamente.
                    </div>
                    
                    <div th:if="${param.registroExitoso}" class="alert alert-success mt-3 text-center" role="alert">
                        ¡Registro completado! Ya puedes ingresar.
                    </div>
                </div>
            </div>
        </div>

        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
