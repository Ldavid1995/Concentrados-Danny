<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}">
        <title>Ingreso - Concentrados Danny</title>
    </head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>
        
        <div class="container"> 
            <div class="row my-5">
                <div class="col-md-6 offset-md-3 col-lg-4 offset-lg-4">
                    <div class="card shadow border-0"> 
                        <div class="card-header bg-success text-white text-center p-3">
                            <h2 class="mb-0" th:text="#{login.login}">Ingresar</h2>
                        </div>
                        <div class="card-body p-4">
                            <form method="POST" th:action="@{/login}">
                                
                                <div class="row my-3">
                                    <label for="username" class="col-md-1 my-auto">
                                        <i class="fas fa-user-lock text-success"></i>
                                    </label>
                                    <div class="col-md-11 my-auto">
                                        <input class="form-control" id="username" type="text" name="username" 
                                               th:placeholder="#{login.username}" required="required" autofocus="autofocus"/>
                                    </div>
                                </div>
                                
                                <div class="row my-3">
                                    <label for="password" class="col-md-1 my-auto">
                                        <i class="fas fa-key text-success"></i>
                                    </label>
                                    <div class="col-md-11 my-auto">
                                        <input class="form-control" id="password" type="password" name="password" 
                                               th:placeholder="#{login.password}" required="required"/>
                                    </div>
                                </div>                            
                                
                                <div class="d-grid gap-2 mt-4">
                                    <button class="btn btn-success fw-bold" type="submit">
                                        <i class="fas fa-sign-in-alt"></i> Ingresar
                                    </button>
                                </div>

                                <hr class="my-4"/>

                                <div class="d-flex justify-content-between">
                                    <a th:href="@{/registro/nuevo}" class="btn btn-outline-primary btn-sm">
                                        <i class="fas fa-user-plus"></i> Registrar
                                    </a>                                
                                    <a th:href="@{/registro/recordar}" class="btn btn-outline-info btn-sm">
                                        <i class="fas fa-envelope"></i> Recordar
                                    </a>                                
                                </div>
                            </form>
                        </div>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger mt-3 text-center border-0 shadow-sm" role="alert">
                        <i class="fas fa-exclamation-circle"></i> 
                        <span th:text="#{error.login}">Error en las credenciales</span>
                    </div>
                    
                    <div th:if="${param.logout}" class="alert alert-info mt-3 text-center border-0 shadow-sm" role="alert">
                        <i class="fas fa-info-circle"></i> Has cerrado sesión correctamente.
                    </div>
                    
                    <div th:if="${param.registroExitoso}" class="alert alert-success mt-3 text-center border-0 shadow-sm" role="alert">
                        <i class="fas fa-check-circle"></i> ¡Registro completado! Ya puedes ingresar.
                    </div>
                </div>
            </div>
        </div>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
