<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>

    <div class="container mt-5">
        <div class="card shadow border-0" style="max-width: 800px; margin: auto;">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-user-edit me-2"></i>Editar Mi Perfil</h4>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/perfil/guardar}" th:object="${usuario}" method="POST">
                    <input type="hidden" th:field="*{idUsuario}" />
                    <input type="hidden" th:field="*{username}" />

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control" 
                                   placeholder="Ingresa tu nombre" required />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Apellidos</label>
                            <input type="text" th:field="*{apellidos}" class="form-control" 
                                   placeholder="Ingresa tus apellidos" required />
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" th:field="*{correo}" class="form-control" required />
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Teléfono</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                            <input type="tel" th:field="*{telefono}" class="form-control" 
                                   placeholder="Ej: 506 8888-8888" />
                        </div>
                    </div>

                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <p class="text-muted small mb-0">
                            <i class="fas fa-lock me-1"></i> El nombre de usuario no se puede cambiar.
                        </p>
                        <div>
                            <a th:href="@{/perfil}" class="btn btn-outline-secondary me-2">Cancelar</a>
                            <button type="submit" class="btn btn-success px-4">
                                <i class="fas fa-save me-1"></i> Guardar Cambios
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
