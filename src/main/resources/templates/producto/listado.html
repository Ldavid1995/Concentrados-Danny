<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    
    <header th:replace="~{general/fragmentos :: header}"></header>

    <div class="container mt-4 mb-5">
        <div class="card shadow-sm border-0">
            <div class="card-header py-3 bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-store me-2"></i>Nuestros Concentrados</h4>
            </div>
            
            <div class="card-body p-4">
                
                <div th:if="${especieSeleccionada == null or especieSeleccionada == ''}">
                    <div class="text-center mb-4">
                        <h5 class="text-muted">Seleccione una especie para ver los productos</h5>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4" th:each="esp : ${ {'Perros', 'Gatos', 'Peces', 'Porcinos', 'Bovinos', 'Aves', 'Pollos(Venta Unidad)'} }">
                            <a class="btn btn-outline-success w-100 py-3 fw-bold shadow-sm" 
                               th:href="@{/producto/listado(especie=${esp})}" 
                               th:text="${esp}">Especie</a>
                        </div>
                    </div>
                </div>

                <div th:if="${especieSeleccionada != null and especieSeleccionada != ''}">
                    
                    <div class="row mb-4 align-items-center">
                        <div class="col-md-7">
                            <form th:action="@{/producto/listado}" method="get" class="d-flex">
                                <input type="hidden" name="especie" th:value="${especieSeleccionada}">
                                <input type="text" name="keyword" th:value="${keyword}" 
                                       class="form-control me-2" 
                                       placeholder="Buscar por nombre o marca..." required>
                                <button type="submit" class="btn btn-outline-success">
                                    <i class="fas fa-search"></i>
                                </button>
                                <a th:href="@{/producto/listado(especie=${especieSeleccionada})}" class="btn btn-outline-secondary ms-1" title="Limpiar">
                                    <i class="fas fa-eraser"></i>
                                </a>
                                <a th:href="@{/producto/exportar-pdf}" class="btn btn-outline-danger ms-1" title="PDF">
                                    <i class="fas fa-file-pdf"></i>
                                </a>
                            </form>
                        </div>
                        
                        <div class="col-md-5 text-md-end mt-2 mt-md-0" sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/producto/nuevo}" class="btn btn-success px-4 shadow-sm">
                                <i class="fas fa-plus me-1"></i> Agregar Nuevo
                            </a>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Listado: <span class="badge bg-success px-3" th:text="${especieSeleccionada}">Especie</span></h5>
                        <a class="btn btn-link text-decoration-none text-secondary" th:href="@{/producto/listado}">
                            <i class="fas fa-undo-alt me-1"></i> Cambiar Especie
                        </a>
                    </div>

                    <div class="table-responsive rounded shadow-sm">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th>Nombre</th>
                                    <th>Marca</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th class="text-center">Vencimiento</th>
                                    <th class="text-center">Acciones</th> 
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="producto, contador : ${productos}">
                                    <td th:text="${contador.count}">1</td>
                                    <td class="fw-bold" th:text="${producto.nombre}">Nombre</td>
                                    <td th:text="${producto.marca}">Marca</td>
                                    <td class="fw-bold text-success">
                                        ₡[[${#numbers.formatDecimal(producto.precio, 1, 'COMMA', 0, 'POINT')}]]
                                    </td>
                                    <td>
                                        <span th:text="${producto.existencias}" 
                                              th:class="${producto.existencias < 10} ? 'text-danger fw-bold' : ''">0</span>
                                    </td>
                                    <td class="text-center">
                                        <span th:if="${producto.fechaVencimiento != null}" 
                                              th:text="${producto.fechaVencimiento}" 
                                              class="badge bg-info text-dark"></span>
                                    </td>
                                    <td class="text-center">
                                        <div class="btn-group shadow-sm">
                                            <a th:href="@{/carrito/agregar/{idProducto}(idProducto=${producto.idProducto})}"
                                               class="btn btn-success btn-sm" title="Agregar al carrito">
                                                <i class="fas fa-cart-plus"></i>
                                            </a>
                                            <a th:href="@{/deseos/agregar/{id}(id=${producto.idProducto})}" 
                                               class="btn btn-outline-danger btn-sm" title="Favoritos">
                                                <i class="far fa-heart"></i>
                                            </a>

                                            <span sec:authorize="hasAuthority('ADMIN')" class="d-flex">
                                                <a th:href="@{/producto/modificar/{idProducto}(idProducto=${producto.idProducto})}" 
                                                   class="btn btn-warning btn-sm mx-1" title="Editar">
                                                    <i class="fas fa-pencil-alt text-white"></i>
                                                </a>
                                                <a th:href="@{/producto/eliminar/{idProducto}(idProducto=${producto.idProducto})}" 
                                                   class="btn btn-danger btn-sm" title="Eliminar"
                                                   onclick="return confirm('¿Está seguro de eliminar este producto?')">
                                                    <i class="fas fa-trash"></i>
                                                </a>
                                            </span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>

</body>
</html>
