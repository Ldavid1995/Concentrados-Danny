<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reportes - Concentrados Danny</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .navbar { background-color: #28a745 !important; }
        .card-header { background-color: #e9f5ec; color: #155724; border-bottom: 2px solid #28a745; }
        .badge { font-size: 0.95rem; padding: 0.5em 0.8em; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/producto/listado">Concentrados Danny - Reportes</a>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header text-center">
                <h3><i class="fas fa-chart-pie me-2"></i>Análisis de Inventario </h3>
            </div>
            <div class="card-body">
                
                <div th:if="${hayStockBajo}" class="alert alert-warning border-warning d-flex align-items-center mb-4" role="alert">
                    <i class="fas fa-exclamation-circle fs-4 me-3"></i>
                    <div>
                        <strong>¡Atención Danny!</strong> Tienes marcas con inventario crítico (5 unidades o menos).
                    </div>
                </div>

                <div class="alert alert-success text-center mb-4">
                    <h4 class="mb-0">Valor Total del Inventario: </h4>
                    <h2 class="display-6 fw-bold">₡[[${totalDinero}]]</h2>
                </div>
                
                <hr>
                
                <h5 class="mb-3"><i class="fas fa-boxes me-2"></i>Stock Acumulado por Marca</h5>
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Marca del Producto</th>
                            <th class="text-center">Total Existencias</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="fila : ${stockMarcas}">
                            <td class="fw-bold" th:text="${fila[0]}">Marca</td>
                            <td class="text-center">
                                <span th:class="${fila[1] <= 5} ? 'badge bg-danger' : 'badge bg-success'"
                                      th:text="${fila[1]}">
                                    0
                                </span>
                                <i th:if="${fila[1] <= 5}" 
                                   class="fas fa-exclamation-triangle text-danger ms-2" 
                                   title="¡Stock Crítico!"></i>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="text-end mt-4">
                    <a href="/producto/listado" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Volver al Inventario
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
