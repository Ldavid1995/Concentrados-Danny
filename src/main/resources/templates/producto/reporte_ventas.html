<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Ventas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="text-success">Ventas de <span th:text="${mesNombre}">Mes</span></h2>
    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>ID</th>
                <th>Monto</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${ventas}">
                <td th:text="${v.idVenta}">1</td>
                <td th:text="${v.total}">0</td>
            </tr>
        </tbody>
    </table>
    <a href="/producto/listado" class="btn btn-secondary">Volver</a>
</body>
</html>
