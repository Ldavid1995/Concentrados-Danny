<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cobertura de Entregas - Danny</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .navbar { background-color: #28a745 !important; }
        .map-container { height: 450px; width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid #28a745; }
        .card-header { background-color: #e9f5ec; color: #155724; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/producto/listado">Concentrados Danny</a>
            <a href="/producto/listado" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header">Mapa de Cobertura Ganadera</div>
                    <div class="card-body p-0">
                        <div class="map-container">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d125714.484277742!2d-84.2185565!3d10.0520445!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8fa0f9001f308877%3A0x676e102283a88a44!2sAlajuela%20Province!5e0!3m2!1sen!2scr!4v1710000000000!5m2!1sen!2scr" 
                            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                        </iframe>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow border-success">
                    <div class="card-body">
                        <h5 class="text-success fw-bold"><i class="fas fa-truck"></i> Zonas de Entrega</h5>
                        <hr>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item"><i class="fas fa-check-circle text-success"></i> Ciudad Quesada</li>
                            <li class="list-group-item"><i class="fas fa-check-circle text-success"></i> Aguas Zarcas</li>
                            <li class="list-group-item"><i class="fas fa-check-circle text-success"></i> Pital (Rutas Ganaderas)</li>
                            <li class="list-group-item"><i class="fas fa-check-circle text-success"></i> Fortuna</li>
                        </ul>
                        <div class="alert alert-info mt-3 small">
                            <i class="fas fa-info-circle"></i> Entregas a fincas los días martes y jueves.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
