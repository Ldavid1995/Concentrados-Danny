<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Concentrados Danny - Inicio</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; }
        .hero-section { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1350&q=80'); 
            height: 300px; 
            background-size: cover; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }
        .btn-categoria { 
            background-color: #28a745; 
            color: white; 
            border: none; 
            padding: 25px; 
            font-size: 1.2rem; 
            border-radius: 10px; 
            transition: 0.3s; 
            display: block;
            text-decoration: none;
            width: 100%;
        }
        .btn-categoria:hover { 
            background-color: #218838; 
            transform: scale(1.05); 
            color: white; 
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div>
            <h1 class="display-3">Concentrados Danny</h1>
            <p class="lead">Los mejores concentrados para tus animales</p>
        </div>
    </div>

    <div class="container text-center my-5">
        <h2 class="mb-4" style="color: #155724;">Selecciona una Categoría</h2>
        
        <div class="row justify-content-center g-4">
            
            <div class="col-md-5">
                <a th:href="@{/producto/listado}" class="btn-categoria">
                    🐾 Todos los Productos
                </a>
            </div>
            
            <div class="col-md-5">
                <a th:href="@{/producto/listado}" class="btn-categoria">
                    🐔 Pollos (Venta Unidad)
                </a>
            </div>
            
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
