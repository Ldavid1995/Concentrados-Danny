# ==========================================
# CONFIGURACI\u00d3N DE CONEXI\u00d3N A ORACLE CLOUD
# ==========================================

# 1. URL de conexi\u00f3n thin utilizando el servicio de tu Wallet
spring.datasource.url=jdbc:oracle:thin:@lenguajesbasesdatos_low?TNS_ADMIN=C:/Oracle/LengujesBaseDatos/Wallet_LenguajesBasesDatos

# 2. Tus credenciales del esquema
spring.datasource.username=Concentrados
spring.datasource.password=Proyecto$2026

# 3. Driver de Oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# 4. Configurar la ubicaci\u00f3n de tu Wallet de Oracle Cloud (Modifica la ruta a tu carpeta real)
# Nota para Windows: Usa barras normales '/' o doble barra '\\'
spring.datasource.oracle.net.wallet_location=(SOURCE=(METHOD=file)(METHOD_DATA=(DIRECTORY=C:/OracleWallet/Wallet_Concentrados)))

# ==========================================
# CONFIGURACI\u00d3N DE JPA / HIBERNATE
# ==========================================

# Usar el dialecto de Oracle 12c o superior (compatible con Autonomous Database)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# ddl-auto en 'none' o 'validate' para que Spring Boot no intente modificar o borrar tus tablas de Oracle
spring.jpa.hibernate.ddl-auto=validate

# Mostrar los queries que ejecuta Hibernate en la consola (\u00fatil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
