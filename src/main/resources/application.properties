spring.application.name=Danny


server.port=8085

# Configuración de Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/concentrados_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

ruta.fichas=file:./fichas/
spring.main.allow-bean-definition-overriding=true
